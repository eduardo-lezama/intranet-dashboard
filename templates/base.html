<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dashboard central de gestión del hogar">
    <title>{% block title %}Intranet Casa{% endblock %}</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Favicon (opcional - puedes añadirlo después) -->
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icons/favicon.svg') }}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="header__container">
            <div class="header__brand">
                <a href="{{ url_for('main.index') }}" class="header__logo">
                    <svg class="icon icon--lg" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                    <span>El Zulo De La Perversión👀</span>
                </a>
            </div>
            
            <nav class="header__nav" aria-label="Navegación principal">
                <a href="{{ url_for('main.index') }}" 
                   class="header__nav-link {% if request.endpoint == 'main.index' %}header__nav-link--active{% endif %}"
                   aria-current="{% if request.endpoint == 'main.index' %}page{% endif %}">
                    Dashboard
                </a>
                <a href="{{ services.mealie.url }}" 
                   target="_blank"
                   class="header__nav-link">
                    Recetas
                </a>
                <a href="{{ url_for('main.finanzas') }}" 
                   class="header__nav-link {% if request.endpoint == 'main.finanzas' %}header__nav-link--active{% endif %}"
                   aria-current="{% if request.endpoint == 'main.finanzas' %}page{% endif %}">
                    Finanzas
                </a>
                <a href="{{ services.pihole.url }}" 
                    target="_blank"
                    class="header__nav-link">
                    Pi-hole
                </a>

            </nav>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="dashboard">
        {% block content %}{% endblock %}
    </main>

    <!-- JavaScript -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
